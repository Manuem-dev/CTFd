{% extends "base.html" %}

{% block title %}Create Team - {{ event.name }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <a href="{% url 'event_teams' event.slug %}" class="text-sm text-gray-400 hover:text-gray-200 mb-4 inline-flex items-center gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        Back to Teams
    </a>
    <h1 class="text-3xl font-bold text-white mb-2">Create Team</h1>
    <p class="text-gray-400 text-sm mb-8">For {{ event.name }}</p>

    <form method="POST" class="space-y-6" x-data="{ name: '' }">
        {% csrf_token %}
        <div class="bg-gray-900 rounded-xl border border-gray-800 p-6 space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5">Team Name</label>
                <input type="text" name="name" x-model="name" required
                       class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-lg text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all"
                       placeholder="e.g. Hack The Planet">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5">URL Slug</label>
                <input type="text" name="slug" required
                       class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-lg text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all font-mono"
                       placeholder="hack-the-planet"
                       x-bind:value="name ? name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') : ''">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5">Description (optional)</label>
                <textarea name="description" rows="3"
                          class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-lg text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all resize-none"
                          placeholder="Tell others about your team..."></textarea>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <button type="submit" class="px-6 py-2.5 bg-brand-600 hover:bg-brand-500 text-white font-semibold rounded-lg transition-all hover:shadow-lg hover:shadow-brand-600/25">
                Create Team
            </button>
            <a href="{% url 'event_teams' event.slug %}" class="px-6 py-2.5 bg-gray-800 hover:bg-gray-700 text-gray-300 font-medium rounded-lg border border-gray-700 transition-colors">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
