{% if is_correct %}
<div class="pop bg-cyber-green/5 border border-cyber-green/20 rounded-lg p-4 flex items-center gap-3">
    <div class="w-8 h-8 bg-cyber-green/10 rounded-full flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-cyber-green" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
    </div>
    <div>
        <div class="text-sm font-semibold text-cyber-green">Correct! Flag captured!</div>
        <div class="text-xs text-gray-400">+{{ challenge.point_value }} points earned</div>
    </div>
</div>
{% else %}
<div class="shake bg-red-900/10 border border-red-800/30 rounded-lg p-4 flex items-center gap-3">
    <div class="w-8 h-8 bg-red-900/20 rounded-full flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </div>
    <div>
        <div class="text-sm font-semibold text-red-400">Incorrect flag</div>
        <div class="text-xs text-gray-500">Try again! The flag format is usually flag{...}</div>
    </div>
</div>
{% endif %}
